<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexChat</title>
  <meta name="description" content="NexChat — Private real-time chat" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="chat-body">

  <!-- ════════════════ SIDEBAR ════════════════ -->
  <aside class="sidebar" id="sidebar">

    <!-- User Profile -->
    <div class="sidebar-header">
      <div class="user-profile">
        <div class="avatar" id="my-avatar"></div>
        <div class="user-info">
          <span class="user-name" id="my-username"></span>
          <span class="status-row">
            <span class="user-status-dot"></span>
            <span class="user-status-text">Online</span>
          </span>
        </div>
      </div>
      <div class="header-actions">
        <!-- Add Friend Button -->
        <button class="icon-btn" id="add-friend-btn" title="Add friend">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </button>
        <!-- Friend Requests Button -->
        <button class="icon-btn notif-btn" id="requests-btn" title="Friend requests">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="notif-dot" id="notif-dot" hidden></span>
        </button>
        <!-- Logout -->
        <button class="icon-btn logout-btn" id="logout-btn" title="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <!-- Friends list section -->
    <div class="sidebar-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
      <div class="section-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        MESSAGES
      </div>
      <ul class="nav-list" id="friends-list" style="overflow-y:auto;flex:1;"></ul>

      <!-- Empty friends state -->
      <div class="empty-friends" id="empty-friends">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <p>No friends yet</p>
        <span>Click <strong>+</strong> to add someone</span>
      </div>
    </div>
  </aside>

  <!-- ════════════════ MAIN AREA ════════════════ -->
  <main class="chat-main" id="chat-main">

    <!-- Chat Header -->
    <div class="chat-header" id="chat-header">
      <div class="chat-header-left">
        <button class="icon-btn sidebar-toggle" id="sidebar-toggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="chat-title-info" id="chat-title-info" hidden>
          <div class="avatar chat-peer-avatar" id="chat-peer-avatar"></div>
          <div>
            <div class="chat-title" id="chat-title"></div>
            <div class="chat-subtitle" id="chat-subtitle">tap to view profile</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Messages Area -->
    <div class="messages-area" id="messages-area">
      <div class="welcome-state" id="welcome-state">
        <div class="welcome-icon">
          <svg width="64" height="64" viewBox="0 0 32 32" fill="none">
            <path d="M16 2C8.27 2 2 8.27 2 16c0 2.44.65 4.73 1.79 6.71L2 30l7.29-1.79A13.94 13.94 0 0016 30c7.73 0 14-6.27 14-14S23.73 2 16 2z" fill="url(#wGrad)"/>
            <defs><linearGradient id="wGrad" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse"><stop stop-color="#6C63FF"/><stop offset="1" stop-color="#43CBFF"/></linearGradient></defs>
          </svg>
        </div>
        <h2>Welcome to NexChat</h2>
        <p>Add friends and start chatting privately.</p>
        <button class="btn-outline" id="welcome-add-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Find People
        </button>
      </div>
      <div class="messages-list" id="messages-list"></div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing-bar" id="typing-bar" hidden>
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span class="typing-text" id="typing-text"></span>
    </div>

    <!-- Input Area -->
    <div class="input-area" id="input-area">
      <div class="message-input-wrapper">
        <textarea id="message-input" class="message-input" placeholder="Select a conversation to start messaging…" rows="1" maxlength="2000" disabled></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>

  <!-- ════════ ADD FRIEND MODAL ════════ -->
  <div class="modal-backdrop" id="add-friend-modal" hidden>
    <div class="modal glass">
      <div class="modal-header">
        <h3>Find People</h3>
        <button class="icon-btn" id="close-add-modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="search-input-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="user-search-input" placeholder="Search by username…" autocomplete="off" />
        </div>
        <div class="search-results" id="search-results">
          <div class="search-hint">Type at least 2 characters to search</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════ FRIEND REQUESTS MODAL ════════ -->
  <div class="modal-backdrop" id="requests-modal" hidden>
    <div class="modal glass">
      <div class="modal-header">
        <h3>Friend Requests</h3>
        <button class="icon-btn" id="close-requests-modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="requests-list" id="requests-list">
          <div class="empty-state-small">No pending requests</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
